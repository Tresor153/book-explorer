<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LiteraturAtlas — Bücher entdecken</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400;1,700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F2EB;
  --surface:#FFFFFF;
  --text:#1C1814;
  --muted:#7A7368;
  --faint:#C0BAB0;
  --green:#2A4A2C;
  --green-l:#EBF0EB;
  --brown:#7A4A28;
  --brown-l:#F5EDE4;
  --border:rgba(28,24,20,.10);
  --border-m:rgba(28,24,20,.18);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Jost',system-ui,sans-serif;
  --r:12px;
}
[data-theme=dark]{
  --bg:#100E0B;
  --surface:#1C1814;
  --text:#EDE8DF;
  --muted:#8A8278;
  --faint:#3A3630;
  --green:#7BAD7E;
  --green-l:#1A2B1B;
  --brown:#C49A6C;
  --brown-l:#2A1E14;
  --border:rgba(237,232,223,.07);
  --border-m:rgba(237,232,223,.15);
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;line-height:1.6}
button{cursor:pointer;border:none;background:none;font-family:var(--sans)}
img{display:block;max-width:100%}
a{color:var(--green);text-decoration:none}
.hidden{display:none!important}

/* ── GRAIN OVERLAY ── */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px 256px}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:100;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  background:rgba(245,242,235,.88);border-bottom:1px solid var(--border);transition:background .3s}
[data-theme=dark] header{background:rgba(16,14,11,.88)}
.hinner{max-width:1140px;margin:0 auto;padding:0 2rem;height:68px;display:flex;align-items:center;justify-content:space-between;gap:1rem}

.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-sq{width:40px;height:40px;background:var(--text);color:var(--bg);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:20px;font-weight:700;flex-shrink:0}
.logo-words{display:flex;flex-direction:column;line-height:1.1}
.logo-name{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--text)}
.logo-name em{color:var(--brown);font-style:italic}
.logo-tag{font-size:10px;font-weight:300;color:var(--faint);letter-spacing:1.8px;text-transform:uppercase}

nav{display:flex;align-items:center;gap:6px}
.nbtn{padding:7px 16px;border-radius:30px;font-size:13px;font-weight:400;color:var(--muted);transition:all .2s;display:flex;align-items:center;gap:6px}
.nbtn:hover{background:var(--surface);color:var(--text)}
.nbtn.on{background:var(--text);color:var(--bg)}
.badge{background:var(--brown);color:#fff;border-radius:10px;font-size:11px;font-weight:500;padding:2px 7px;min-width:20px;text-align:center;display:none}
.badge.show{display:inline-block}
.toggle{width:40px;height:40px;border-radius:50%;border:1px solid var(--border-m);color:var(--muted);
  display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;margin-left:4px}
.toggle:hover{background:var(--surface);color:var(--text)}
[data-theme=light] .moon-i{display:none}
[data-theme=dark]  .sun-i{display:none}

/* ── HERO ── */
.hero{padding:7rem 0 4.5rem;text-align:center;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:600px;height:1px;background:linear-gradient(90deg,transparent,var(--border-m),transparent)}
.wrap{max-width:1140px;margin:0 auto;padding:0 2rem;position:relative;z-index:1}
.eyebrow{font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--brown);margin-bottom:1.5rem;
  opacity:0;animation:up .6s .1s forwards}
h1{font-family:var(--serif);font-size:clamp(3.2rem,7vw,5.8rem);font-weight:300;line-height:1.04;letter-spacing:-1px;
  color:var(--text);margin-bottom:2.5rem;opacity:0;animation:up .7s .2s forwards}
h1 em{color:var(--green);font-style:italic}
h1 .dim{color:var(--muted);font-weight:300}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* ── SEARCH ── */
.sbox{max-width:620px;margin:0 auto 1.8rem;opacity:0;animation:up .7s .3s forwards}
.sform{display:flex;align-items:center;gap:0;background:var(--surface);border:1.5px solid var(--border-m);
  border-radius:50px;padding:5px 5px 5px 22px;box-shadow:0 4px 24px rgba(28,24,20,.08);transition:all .25s}
.sform:focus-within{border-color:var(--green);box-shadow:0 0 0 4px rgba(42,74,44,.12),0 4px 24px rgba(28,24,20,.08)}
.sico{font-size:18px;color:var(--faint);flex-shrink:0;margin-right:10px}
#q{flex:1;border:none;outline:none;background:transparent;font-family:var(--sans);font-size:15px;color:var(--text);font-weight:300}
#q::placeholder{color:var(--faint)}
#sbtn{padding:11px 26px;border-radius:40px;background:var(--text);color:var(--bg);font-size:13px;font-weight:500;
  transition:all .2s;display:flex;align-items:center;gap:8px;flex-shrink:0}
#sbtn:hover{opacity:.85}
#sbtn:active{transform:scale(.97)}
.arr{transition:transform .2s}
#sbtn:hover .arr{transform:translateX(3px)}

/* ── PILLS ── */
.pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;
  opacity:0;animation:up .7s .4s forwards}
.plabel{font-size:12px;color:var(--faint);font-weight:300;letter-spacing:.3px}
.pill{padding:6px 16px;border:1px solid var(--border-m);border-radius:30px;font-size:13px;font-weight:300;
  color:var(--muted);background:var(--surface);transition:all .2s}
.pill:hover{border-color:var(--green);color:var(--green);background:var(--green-l);transform:translateY(-1px)}

/* ── RESULTS BAR ── */
.rbar{display:flex;align-items:center;gap:14px;margin-bottom:2rem;padding-top:.5rem}
.rline{width:28px;height:1.5px;background:var(--brown);flex-shrink:0}
.rtitle{font-size:15px;font-weight:500}
.rcount{font-size:13px;font-weight:300;color:var(--muted)}

/* ── GRID ── */
main{max-width:1140px;margin:0 auto;padding:0 2rem 6rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:1.6rem;margin-bottom:4rem}

/* skeleton */
.skel{background:var(--surface);border-radius:var(--r);overflow:hidden;animation:pulse 1.5s ease-in-out infinite}
.skel-img{height:240px;background:var(--bg)}
.skel-bod{padding:14px}
.skel-l{height:12px;background:var(--bg);border-radius:4px;margin-bottom:8px}
.skel-l.s{width:55%}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* card */
.card{background:var(--surface);border-radius:var(--r);overflow:hidden;border:1px solid var(--border);
  cursor:pointer;transition:all .3s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;position:relative}
.card:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(28,24,20,.15);border-color:transparent}
.card:hover .cimg img{transform:scale(1.06)}

.cimg{aspect-ratio:2/3;overflow:hidden;background:var(--bg);position:relative}
.cimg img{width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.16,1,.3,1)}
.no-cover{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:var(--faint);font-family:var(--serif);font-size:13px;font-style:italic;text-align:center;padding:1rem}
.no-cover svg{opacity:.25}

.stag{position:absolute;top:10px;right:10px;font-size:10px;font-weight:500;padding:4px 10px;
  border-radius:20px;letter-spacing:.3px;backdrop-filter:blur(8px)}
.s-r{background:rgba(42,74,44,.88);color:#fff}
.s-w{background:rgba(122,74,40,.88);color:#fff}
.s-d{background:rgba(40,36,32,.88);color:#fff}

.cinfo{padding:14px;flex:1;display:flex;flex-direction:column;gap:4px}
.ctitle{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--text);line-height:1.25;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cauthor{font-size:12px;font-weight:300;color:var(--muted)}
.cyear{font-size:11px;font-weight:300;color:var(--faint)}

/* empty */
.empty{text-align:center;padding:5rem 1rem;color:var(--muted)}
.empty-ico{font-size:3rem;color:var(--faint);margin-bottom:1rem;opacity:.4;font-family:var(--serif)}

/* ── READING LIST ── */
.rl-head{padding:2.5rem 0 1.5rem}
.rl-head h2{font-family:var(--serif);font-size:2.8rem;font-weight:300;letter-spacing:-.5px}
.rl-head h2 em{color:var(--brown);font-style:italic}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:2rem}
.tab{padding:10px 22px;font-size:14px;font-weight:300;color:var(--muted);border-bottom:2px solid transparent;
  margin-bottom:-1px;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.on{color:var(--green);border-bottom-color:var(--green);font-weight:500}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(10,8,6,.65);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;padding:1.5rem;animation:fin .2s ease}
@keyframes fin{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:20px;max-width:560px;width:100%;max-height:88vh;
  overflow-y:auto;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.3);border:1px solid var(--border-m);
  animation:mup .3s cubic-bezier(.16,1,.3,1)}
@keyframes mup{from{transform:translateY(30px) scale(.97);opacity:0}to{transform:none;opacity:1}}
.mclose{position:absolute;top:16px;right:16px;z-index:2;width:34px;height:34px;border-radius:50%;
  background:var(--bg);color:var(--muted);font-size:13px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);transition:all .2s}
.mclose:hover{background:var(--text);color:var(--bg)}
.mrow{display:flex;gap:1.5rem;padding:2rem}
.mcov{width:115px;flex-shrink:0;aspect-ratio:2/3;border-radius:8px;overflow:hidden;background:var(--bg);
  box-shadow:6px 6px 24px rgba(0,0,0,.2)}
.mcov img{width:100%;height:100%;object-fit:cover}
.mmeta{flex:1;padding-top:4px}
.mtitle{font-family:var(--serif);font-size:1.5rem;font-weight:700;line-height:1.2;margin-bottom:.5rem}
.mauthor{color:var(--muted);font-size:14px;font-weight:300;margin-bottom:4px}
.myear{color:var(--faint);font-size:12px;font-weight:300;margin-bottom:1.2rem}
.mdesc{padding:0 2rem 1.5rem;font-size:14px;font-weight:300;color:var(--muted);line-height:1.8;
  font-style:italic;border-bottom:1px solid var(--border)}
.mactions{padding:1.5rem 2rem;display:flex;gap:8px;flex-wrap:wrap}
.abtn{flex:1;min-width:115px;padding:10px 12px;border-radius:8px;border:1px solid var(--border-m);
  font-size:13px;font-weight:400;color:var(--muted);background:transparent;transition:all .2s;font-family:var(--sans)}
.abtn:hover{border-color:var(--green);color:var(--green);background:var(--green-l)}
.abtn.on{border-color:var(--green);color:var(--green);background:var(--green-l);font-weight:500}
.mol{width:100%;text-align:center;padding:8px;font-size:13px}
.mol a{color:var(--brown);font-weight:500}

/* ── TOAST ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);
  padding:12px 24px;border-radius:30px;font-size:13px;z-index:999;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.25);animation:tin .3s cubic-bezier(.16,1,.3,1)}
@keyframes tin{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}

/* ── FOOTER ── */
footer{border-top:1px solid var(--border);padding:2rem 0}
.finner{max-width:1140px;margin:0 auto;padding:0 2rem;display:flex;align-items:center;gap:14px}
.flogo{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--muted)}
.flogo em{color:var(--brown);font-style:italic}
.ftxt{font-size:13px;font-weight:300;color:var(--faint)}
.ftxt a{color:var(--muted)}

@media(max-width:640px){
  h1{font-size:2.8rem}
  .logo-tag,.logo-words .logo-tag{display:none}
  .mrow{flex-direction:column;align-items:center}
  .mcov{width:100px}
}
</style>
</head>
<body data-theme="light">

<header>
  <div class="hinner">
    <a class="logo" href="#">
      <div class="logo-sq">L</div>
      <div class="logo-words">
        <span class="logo-name">Literatur<em>Atlas</em></span>
        <span class="logo-tag">Bücher entdecken</span>
      </div>
    </a>
    <nav>
      <button class="nbtn on" data-view="search">✦ Entdecken</button>
      <button class="nbtn" data-view="reading">◈ Meine Liste <span class="badge" id="badge">0</span></button>
      <button class="toggle" id="toggle"><span class="sun-i">☀</span><span class="moon-i">☽</span></button>
    </nav>
  </div>
</header>

<section class="hero" id="v-search">
  <div class="wrap">
    <div class="eyebrow">Millionen Bücher. Ein Ort.</div>
    <h1>Dein nächstes<br/><em>großes Buch</em><br/><span class="dim">wartet auf dich.</span></h1>
    <div class="sbox">
      <div class="sform">
        <span class="sico">⌕</span>
        <input id="q" type="text" placeholder="Titel, Autor oder Thema …" autocomplete="off"/>
        <button id="sbtn"><span>Suchen</span><span class="arr">→</span></button>
      </div>
    </div>
    <div class="pills">
      <span class="plabel">Entdecken:</span>
      <button class="pill" data-q="homeopathy">Homöopathie</button>
      <button class="pill" data-q="philosophy medicine">Philosophie</button>
      <button class="pill" data-q="natural healing">Naturheilkunde</button>
      <button class="pill" data-q="psychology">Psychologie</button>
      <button class="pill" data-q="history">Geschichte</button>
    </div>
  </div>
</section>

<main>
  <div id="rbar" class="rbar hidden">
    <div class="rline"></div>
    <span id="rtitle" class="rtitle"></span>
    <span id="rcount" class="rcount"></span>
  </div>
  <div id="skelgrid" class="grid hidden"></div>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty hidden">
    <div class="empty-ico">◎</div>
    <p>Keine Bücher gefunden.<br/>Versuche einen anderen Suchbegriff.</p>
  </div>

  <section id="v-reading" class="hidden">
    <div class="rl-head">
      <h2>Meine <em>Leseliste</em></h2>
    </div>
    <div class="tabs">
      <button class="tab on" data-s="reading">📖 Am Lesen</button>
      <button class="tab" data-s="want">🔖 Merkliste</button>
      <button class="tab" data-s="done">✅ Gelesen</button>
    </div>
    <div id="rl-grid" class="grid"></div>
    <div id="rl-empty" class="empty hidden">
      <div class="empty-ico">◎</div>
      <p>Noch keine Bücher hier.</p>
    </div>
  </section>
</main>

<div class="overlay hidden" id="overlay">
  <div class="modal">
    <button class="mclose" id="mclose">✕</button>
    <div id="mcontent"></div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<footer>
  <div class="finner">
    <span class="flogo">L<em>A</em></span>
    <p class="ftxt">Betrieben von <a href="https://openlibrary.org" target="_blank">Open Library</a> · Vanilla JS · Eine Datei</p>
  </div>
</footer>

<script>
const $=id=>document.getElementById(id);
const state={
  view:'search',tab:'reading',
  list:JSON.parse(localStorage.getItem('la-list')||'[]'),
  lastQ:''
};

// Init
updateBadge();
buildSkeleton();

// Listeners
$('sbtn').onclick=go;
$('q').onkeydown=e=>{if(e.key==='Enter')go()};
document.querySelectorAll('.pill').forEach(p=>p.onclick=()=>{$('q').value=p.dataset.q;go()});
document.querySelectorAll('.nbtn').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.nbtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  switchView(b.dataset.view);
});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  state.tab=t.dataset.s;
  renderRL();
});
$('mclose').onclick=closeM;
$('overlay').onclick=e=>{if(e.target===$('overlay'))closeM()};
$('toggle').onclick=()=>{
  const n=document.body.dataset.theme==='light'?'dark':'light';
  document.body.dataset.theme=n;
  localStorage.setItem('la-theme',n);
};
const saved=localStorage.getItem('la-theme');
if(saved)document.body.dataset.theme=saved;

// View
function switchView(v){
  state.view=v;
  $('v-search').classList.toggle('hidden',v!=='search');
  $('v-reading').classList.toggle('hidden',v!=='reading');
  $('grid').classList.toggle('hidden',v!=='search');
  $('rbar').classList.toggle('hidden',v!=='search'||!state.lastQ);
  $('empty').classList.add('hidden');
  if(v==='reading')renderRL();
}

// Search
async function go(){
  const q=$('q').value.trim();
  if(!q)return;
  state.lastQ=q;
  showSkel();
  $('grid').innerHTML='';
  $('empty').classList.add('hidden');
  try{
    const r=await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=24&fields=key,title,author_name,first_publish_year,cover_i`);
    if(!r.ok)throw new Error();
    const d=await r.json();
    hideSkel();
    if(!d.docs||!d.docs.length){$('empty').classList.remove('hidden');$('rbar').classList.add('hidden');return;}
    $('rtitle').textContent=`Ergebnisse für „${q}"`;
    $('rcount').textContent=`${d.docs.length} Bücher`;
    $('rbar').classList.remove('hidden');
    d.docs.slice(0,24).forEach(b=>$('grid').appendChild(makeCard(b)));
  }catch{hideSkel();toast('Fehler – bitte erneut versuchen.');}
}

// Card
function makeCard(b,inRL=false){
  const el=document.createElement('div');
  el.className='card';
  el.dataset.key=b.key;
  const url=b.cover_i?`https://covers.openlibrary.org/b/id/${b.cover_i}-M.jpg`:null;
  const t=b.title||'Unbekannt';
  const a=b.author_name?b.author_name[0]:'Unbekannt';
  const y=b.first_publish_year||'';
  const st=getStatus(b.key);
  el.innerHTML=`
    <div class="cimg">
      ${url?`<img src="${url}" alt="${esc(t)}" loading="lazy"/>`:`
      <div class="no-cover">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <span>${esc(t)}</span>
      </div>`}
      ${st?`<span class="stag s-${st[0]}">${stLabel(st)}</span>`:''}
    </div>
    <div class="cinfo">
      <div class="ctitle">${esc(t)}</div>
      <div class="cauthor">${esc(a)}</div>
      ${y?`<div class="cyear">${y}</div>`:''}
    </div>`;
  el.onclick=()=>openM(b);
  return el;
}

// Modal
async function openM(b){
  const url=b.cover_i?`https://covers.openlibrary.org/b/id/${b.cover_i}-L.jpg`:null;
  const t=b.title||'Unbekannt';
  const a=b.author_name?b.author_name.join(', '):'Unbekannt';
  const y=b.first_publish_year||'';
  const key=b.key?.replace('/works/','');
  const olUrl=key?`https://openlibrary.org/works/${key}`:'https://openlibrary.org';
  const st=getStatus(b.key);

  $('mcontent').innerHTML=`
    <div class="mrow">
      <div class="mcov">${url?`<img src="${url}" alt="${esc(t)}"/>`:`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;opacity:.2">📘</div>`}</div>
      <div class="mmeta">
        <div class="mtitle">${esc(t)}</div>
        <div class="mauthor">${esc(a)}</div>
        ${y?`<div class="myear">Erstveröffentlicht ${y}</div>`:''}
        <div id="dload" style="font-size:13px;color:var(--faint)">Lade Beschreibung …</div>
      </div>
    </div>
    <div class="mdesc hidden" id="mdesc"></div>
    <div class="mactions">
      <button class="abtn ${st==='reading'?'on':''}" data-s="reading">📖 Am Lesen</button>
      <button class="abtn ${st==='want'?'on':''}" data-s="want">🔖 Merkliste</button>
      <button class="abtn ${st==='done'?'on':''}" data-s="done">✅ Gelesen</button>
      <div class="mol"><a href="${olUrl}" target="_blank">Auf Open Library ansehen →</a></div>
    </div>`;

  $('mcontent').querySelectorAll('.abtn').forEach(btn=>btn.onclick=()=>{
    toggleSt(b,btn.dataset.s);
    $('mcontent').querySelectorAll('.abtn').forEach(x=>x.classList.toggle('on',x.dataset.s===getStatus(b.key)));
  });

  $('overlay').classList.remove('hidden');
  document.body.style.overflow='hidden';

  if(key){
    try{
      const r=await fetch(`https://openlibrary.org/works/${key}.json`);
      const d=await r.json();
      const desc=typeof d.description==='string'?d.description:d.description?.value||'';
      if(desc){
        $('mdesc').textContent=desc.length>600?desc.slice(0,600)+'…':desc;
        $('mdesc').classList.remove('hidden');
      }
    }catch{}finally{$('dload')?.remove()}
  }else{$('dload')?.remove()}
}

function closeM(){$('overlay').classList.add('hidden');document.body.style.overflow='';}

// Reading list
function renderRL(){
  const g=$('rl-grid'),e=$('rl-empty');
  const items=state.list.filter(b=>b.status===state.tab);
  g.innerHTML='';
  if(!items.length){e.classList.remove('hidden');g.classList.add('hidden');}
  else{e.classList.add('hidden');g.classList.remove('hidden');items.forEach(b=>g.appendChild(makeCard(b,true)));}
}

function toggleSt(b,ns){
  const ex=state.list.find(x=>x.key===b.key);
  if(ex&&ex.status===ns){state.list=state.list.filter(x=>x.key!==b.key);toast('Aus Liste entfernt.');}
  else if(ex){ex.status=ns;toast(`Status: ${stLabel(ns)}`);}
  else{state.list.push({...b,status:ns});toast(`Hinzugefügt: ${stLabel(ns)}`);}
  save();updateBadge();refreshCards(b.key);
}

function save(){localStorage.setItem('la-list',JSON.stringify(state.list));}

function updateBadge(){
  const b=$('badge');
  b.textContent=state.list.length;
  b.classList.toggle('show',state.list.length>0);
}

function refreshCards(key){
  document.querySelectorAll(`.card[data-key="${key}"]`).forEach(c=>{
    const st=getStatus(key);
    let tag=c.querySelector('.stag');
    if(st){
      if(!tag){tag=document.createElement('span');c.querySelector('.cimg').appendChild(tag);}
      tag.className=`stag s-${st[0]}`;tag.textContent=stLabel(st);
    }else{tag?.remove();}
  });
  if(state.view==='reading')renderRL();
}

function getStatus(key){return state.list.find(b=>b.key===key)?.status||null;}
function stLabel(s){return{reading:'📖 Lese ich',want:'🔖 Merkliste',done:'✅ Gelesen'}[s]||s;}

// Skeleton
function buildSkeleton(){
  $('skelgrid').innerHTML=Array(8).fill(0).map(()=>`
    <div class="skel"><div class="skel-img"></div><div class="skel-bod">
    <div class="skel-l"></div><div class="skel-l s"></div></div></div>`).join('');
}
function showSkel(){$('skelgrid').classList.remove('hidden');$('grid').classList.add('hidden');}
function hideSkel(){$('skelgrid').classList.add('hidden');$('grid').classList.remove('hidden');}

// Toast
let tt;
function toast(msg){
  clearTimeout(tt);
  const el=$('toast');
  el.textContent=msg;el.classList.remove('hidden');
  tt=setTimeout(()=>el.classList.add('hidden'),2800);
}

// Escape
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
